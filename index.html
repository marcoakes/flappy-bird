<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Flappy Bird</title>
<style>
html, body {
  margin: 0; padding: 0;
  width: 100%; height: 100%;
  background: #000;
  display: flex;
  justify-content: center;
  align-items: center;
}
canvas {
  display: block;
  /* Simple scaling - no calc() or vh units */
  width: 400px;
  height: 600px;
}
@media (max-height: 620px) {
  canvas { width: 267px; height: 400px; }
}
</style>
</head>
<body>
<canvas id="c" width="400" height="600"></canvas>
<script>
// Catch any uncaught errors and show on canvas
window.onerror = function(msg, src, line) {
  var c = document.getElementById('c');
  var x = c.getContext('2d');
  x.fillStyle = '#222';
  x.fillRect(0, 0, 400, 600);
  x.fillStyle = '#ff4444';
  x.font = '16px monospace';
  x.fillText('ERROR: ' + msg, 10, 40);
  x.fillText('Line: ' + line, 10, 70);
  return true;
};

var canvas = document.getElementById('c');
var ctx = canvas.getContext('2d');
var W = 400, H = 600;

var GRAVITY    = 0.45;
var FLAP_VEL   = -8.5;
var MAX_FALL   = 10;
var PIPE_SPEED = 2.2;
var PIPE_GAP   = 135;
var PIPE_SPACE = 185;
var PIPE_W     = 52;
var GROUND_H   = 70;
var BIRD_X     = 120;

var state     = 'menu';
var score     = 0;
var highScore = 0;
var flash     = 0;
var pipes     = [];
var bird      = { y: H/2 - 30, vy: 0, rot: 0 };
var lastTs    = null;

try { highScore = parseInt(localStorage.getItem('fbhs') || '0', 10); } catch(e) {}

function startGame() {
  bird  = { y: H/2 - 30, vy: 0, rot: 0 };
  pipes = [];
  score = 0;
  flash = 0;
  state = 'playing';
  addPipe(W + 80);
}

function addPipe(x) {
  var margin = 70;
  var topH = margin + Math.random() * (H - GROUND_H - PIPE_GAP - margin * 2);
  pipes.push({ x: x, topH: topH, passed: false, nextSpawned: false });
}

function tap() {
  if      (state === 'menu')     { startGame(); }
  else if (state === 'playing')  { bird.vy = FLAP_VEL; }
  else if (state === 'gameover') { state = 'menu'; }
}

window.addEventListener('keydown', function(e) {
  if (e.keyCode === 32) { e.preventDefault(); tap(); }
});
canvas.addEventListener('mousedown', function(e) { e.preventDefault(); tap(); });
canvas.addEventListener('touchstart', function(e) { e.preventDefault(); tap(); }, { passive: false });

function update(dt) {
  if (flash > 0) {
    flash -= dt;
    if (flash <= 0 && state === 'dead') state = 'gameover';
    return;
  }
  if (state !== 'playing') return;

  bird.vy = Math.min(bird.vy + GRAVITY * dt, MAX_FALL);
  bird.y += bird.vy * dt;

  var targetRot = Math.max(-25, Math.min(85, bird.vy * 5.5));
  bird.rot += (targetRot - bird.rot) * 0.18 * dt;

  if (bird.y < 16) { bird.y = 16; bird.vy = 0; }
  if (bird.y > H - GROUND_H - 16) { bird.y = H - GROUND_H - 16; die(); return; }

  for (var i = pipes.length - 1; i >= 0; i--) {
    var p = pipes[i];
    p.x -= PIPE_SPEED * dt;

    if (!p.nextSpawned && p.x < W - PIPE_SPACE) {
      p.nextSpawned = true;
      addPipe(W + PIPE_W);
    }

    if (!p.passed && p.x + PIPE_W < BIRD_X) {
      p.passed = true;
      score++;
      if (score > highScore) {
        highScore = score;
        try { localStorage.setItem('fbhs', highScore); } catch(e) {}
      }
    }

    if (p.x + PIPE_W < -10) { pipes.splice(i, 1); continue; }

    var bL = BIRD_X - 10, bR = BIRD_X + 10;
    var bT = bird.y  - 9,  bB = bird.y  + 9;
    if (bR > p.x && bL < p.x + PIPE_W) {
      if (bT < p.topH || bB > p.topH + PIPE_GAP) { die(); return; }
    }
  }
}

function die() {
  if (score > highScore) {
    highScore = score;
    try { localStorage.setItem('fbhs', highScore); } catch(e) {}
  }
  state = 'dead';
  flash = 10;
}

// --- Draw with ONLY basic shapes (arc, fillRect, fillText) ---
function drawBg() {
  ctx.fillStyle = '#70C5CE';
  ctx.fillRect(0, 0, W, H - GROUND_H);
  ctx.fillStyle = '#5EA832';
  ctx.fillRect(0, H - GROUND_H, W, 20);
  ctx.fillStyle = '#C8A46A';
  ctx.fillRect(0, H - GROUND_H + 20, W, GROUND_H - 20);
}

function drawPipes() {
  for (var i = 0; i < pipes.length; i++) {
    var p = pipes[i];
    ctx.fillStyle = '#4CAF11';
    // top pipe body
    ctx.fillRect(p.x, 0, PIPE_W, p.topH - 18);
    // top pipe cap
    ctx.fillStyle = '#3A9E0A';
    ctx.fillRect(p.x - 5, p.topH - 18, PIPE_W + 10, 18);
    // bottom pipe cap
    var botY = p.topH + PIPE_GAP;
    ctx.fillStyle = '#3A9E0A';
    ctx.fillRect(p.x - 5, botY, PIPE_W + 10, 18);
    // bottom pipe body
    ctx.fillStyle = '#4CAF11';
    ctx.fillRect(p.x, botY + 18, PIPE_W, H - GROUND_H - botY - 18);
  }
}

function drawBird() {
  ctx.save();
  ctx.translate(BIRD_X, bird.y);
  ctx.rotate(bird.rot * Math.PI / 180);
  // Body
  ctx.fillStyle = '#FFD700';
  ctx.beginPath();
  ctx.arc(0, 0, 16, 0, Math.PI * 2);
  ctx.fill();
  // Eye
  ctx.fillStyle = '#fff';
  ctx.beginPath();
  ctx.arc(7, -5, 5, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = '#111';
  ctx.beginPath();
  ctx.arc(8, -5, 2.5, 0, Math.PI * 2);
  ctx.fill();
  // Beak
  ctx.fillStyle = '#FF8F00';
  ctx.beginPath();
  ctx.moveTo(12, -2);
  ctx.lineTo(20, 1);
  ctx.lineTo(12, 4);
  ctx.closePath();
  ctx.fill();
  ctx.restore();
}

function drawScore() {
  ctx.textAlign = 'center';
  ctx.font = 'bold 42px Arial';
  ctx.fillStyle = '#000';
  ctx.fillText(score, W/2 + 2, 64);
  ctx.fillStyle = '#fff';
  ctx.fillText(score, W/2, 62);
}

function drawMenu() {
  ctx.fillStyle = 'rgba(0,0,0,0.5)';
  ctx.fillRect(W/2 - 145, H/2 - 130, 290, 250);

  ctx.textAlign = 'center';
  ctx.font = 'bold 52px Arial';
  ctx.fillStyle = '#FFD700';
  ctx.fillText('FLAPPY BIRD', W/2, H/2 - 65);

  ctx.fillStyle = '#fff';
  ctx.font = 'bold 22px Arial';
  ctx.fillText('Tap or Space to start', W/2, H/2 + 15);

  if (highScore > 0) {
    ctx.fillStyle = '#FFD700';
    ctx.font = '20px Arial';
    ctx.fillText('Best: ' + highScore, W/2, H/2 + 60);
  }
}

function drawGameOver() {
  ctx.fillStyle = 'rgba(0,0,0,0.55)';
  ctx.fillRect(W/2 - 145, H/2 - 130, 290, 270);

  ctx.textAlign = 'center';
  ctx.font = 'bold 46px Arial';
  ctx.fillStyle = '#FF5252';
  ctx.fillText('GAME OVER', W/2, H/2 - 70);

  ctx.fillStyle = '#fff';
  ctx.font = 'bold 28px Arial';
  ctx.fillText('Score: ' + score, W/2, H/2 - 15);

  ctx.fillStyle = '#FFD700';
  ctx.font = '22px Arial';
  ctx.fillText('Best: ' + highScore, W/2, H/2 + 25);

  ctx.fillStyle = 'rgba(255,255,255,0.8)';
  ctx.font = '18px Arial';
  ctx.fillText('Tap or Space to play again', W/2, H/2 + 100);
}

function loop(ts) {
  if (!lastTs) lastTs = ts;
  var dt = Math.min((ts - lastTs) / (1000 / 60), 3);
  lastTs = ts;

  update(dt);

  if (flash > 0) {
    ctx.fillStyle = '#fff';
    ctx.fillRect(0, 0, W, H);
    requestAnimationFrame(loop);
    return;
  }

  drawBg();
  drawPipes();
  drawBird();

  if (state === 'playing')  drawScore();
  if (state === 'menu')     drawMenu();
  if (state === 'gameover') { drawScore(); drawGameOver(); }

  requestAnimationFrame(loop);
}

requestAnimationFrame(loop);
</script>
</body>
</html>
