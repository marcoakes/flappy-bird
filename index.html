<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flappy Bird</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #1a1a2e;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    overflow: hidden;
  }
  canvas {
    display: block;
    /* Scale to fit viewport preserving 400x600 aspect ratio */
    max-width: min(400px, 100vw);
    max-height: min(600px, 100vh);
    width: auto;
    height: auto;
    image-rendering: pixelated;
  }
</style>
</head>
<body>
<canvas id="c" width="400" height="600"></canvas>
<script>
const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');
const W = 400, H = 600;

// ── Constants ──────────────────────────────────────────────────────────────
const GRAVITY      = 0.5;   // px/frame² at 60fps
const FLAP         = -8;    // px/frame upward impulse
const MAX_VEL      = 10;    // max downward px/frame
const PIPE_SPEED   = 2;     // px/frame
const PIPE_GAP     = 130;   // vertical gap height
const PIPE_SPACING = 180;   // horizontal distance between pipe pairs
const PIPE_WIDTH   = 52;
const GROUND_H     = 80;
const BIRD_X       = W / 3;
const BIRD_R       = 14;    // bird collision radius (slightly smaller than drawn)
const HS_KEY       = 'flappy.highScore';

// ── State ──────────────────────────────────────────────────────────────────
let state, bird, pipes, score, highScore, lastTime, flashTimer, particles;

function init() {
  state     = 'menu';
  highScore = parseInt(localStorage.getItem(HS_KEY) || '0', 10);
  resetGame();
}

function resetGame() {
  bird = { y: H / 2, vel: 0, rot: 0, wing: 0, wingDir: 1 };
  pipes = [];
  score = 0;
  flashTimer = 0;
  particles = [];
  // Seed first pipe off-screen right
  spawnPipe(W + PIPE_WIDTH);
}

function spawnPipe(x) {
  const minTop = 60;
  const maxTop = H - GROUND_H - PIPE_GAP - 60;
  const topH   = minTop + Math.random() * (maxTop - minTop);
  pipes.push({ x, topH, scored: false });
}

// ── Input ──────────────────────────────────────────────────────────────────
function onFlap() {
  if (state === 'menu') {
    state = 'playing';
    return;
  }
  if (state === 'gameover') {
    resetGame();
    state = 'menu';
    return;
  }
  if (state === 'playing') {
    bird.vel = FLAP;
  }
}

document.addEventListener('keydown', e => {
  if (e.code === 'Space') { e.preventDefault(); onFlap(); }
});
canvas.addEventListener('mousedown', e => { e.preventDefault(); onFlap(); });
canvas.addEventListener('touchstart', e => { e.preventDefault(); onFlap(); }, { passive: false });

// ── Physics ────────────────────────────────────────────────────────────────
function update(dt) {
  // dt normalised to 60fps
  const s = dt * 60;

  if (state !== 'playing') return;

  // Bird physics
  bird.vel = Math.min(bird.vel + GRAVITY * s, MAX_VEL);
  bird.y  += bird.vel * s;

  // Bird rotation: nose up when flapping, nose down when falling
  const targetRot = Math.max(-25, Math.min(90, bird.vel * 6));
  bird.rot += (targetRot - bird.rot) * 0.15;

  // Wing flap animation
  bird.wing += bird.wingDir * 0.3 * s;
  if (bird.wing > 1 || bird.wing < -1) bird.wingDir *= -1;

  // Flash
  if (flashTimer > 0) flashTimer -= s;

  // Particles
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx * s; p.y += p.vy * s;
    p.vy += 0.2 * s; p.life -= s;
    if (p.life <= 0) particles.splice(i, 1);
  }

  // Ceiling
  if (bird.y - BIRD_R < 0) { bird.y = BIRD_R; bird.vel = 0; }

  // Ground death
  if (bird.y + BIRD_R >= H - GROUND_H) {
    bird.y = H - GROUND_H - BIRD_R;
    die();
    return;
  }

  // Pipes
  for (let i = pipes.length - 1; i >= 0; i--) {
    const p = pipes[i];
    p.x -= PIPE_SPEED * s;

    // Score: bird passes midpoint of pipe
    if (!p.scored && BIRD_X > p.x + PIPE_WIDTH / 2) {
      p.scored = true;
      score++;
      if (score > highScore) {
        highScore = score;
        localStorage.setItem(HS_KEY, highScore);
      }
    }

    // Spawn next pipe
    if (i === pipes.length - 1 && p.x < W - PIPE_SPACING) {
      spawnPipe(W + PIPE_WIDTH);
    }

    // Remove off-screen pipes
    if (p.x + PIPE_WIDTH < 0) { pipes.splice(i, 1); continue; }

    // Collision (AABB with slight forgiveness)
    const bx1 = BIRD_X - BIRD_R + 4, bx2 = BIRD_X + BIRD_R - 4;
    const by1 = bird.y - BIRD_R + 4, by2 = bird.y + BIRD_R - 4;
    const px1 = p.x, px2 = p.x + PIPE_WIDTH;
    const inX = bx2 > px1 && bx1 < px2;
    if (inX) {
      if (by1 < p.topH || by2 > p.topH + PIPE_GAP) { die(); return; }
    }
  }
}

function die() {
  state = 'gameover';
  flashTimer = 8;
  // Burst particles
  for (let i = 0; i < 20; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = 2 + Math.random() * 4;
    particles.push({
      x: BIRD_X, y: bird.y,
      vx: Math.cos(angle) * speed, vy: Math.sin(angle) * speed - 3,
      life: 30 + Math.random() * 20,
      r: 3 + Math.random() * 4,
      color: ['#FFD700','#FF6B6B','#FFF','#FF8C00'][Math.floor(Math.random()*4)]
    });
  }
}

// ── Drawing ────────────────────────────────────────────────────────────────
function drawBg() {
  // Sky gradient
  const sky = ctx.createLinearGradient(0, 0, 0, H - GROUND_H);
  sky.addColorStop(0,   '#4FC3F7');
  sky.addColorStop(1,   '#81D4FA');
  ctx.fillStyle = sky;
  ctx.fillRect(0, 0, W, H - GROUND_H);

  // Clouds (static decoration)
  ctx.fillStyle = 'rgba(255,255,255,0.7)';
  [[60,80,50,18],[150,50,40,15],[280,100,55,20],[340,60,35,12]].forEach(([x,y,w,h])=>{
    ctx.beginPath();
    ctx.ellipse(x, y, w, h, 0, 0, Math.PI*2);
    ctx.fill();
    ctx.beginPath();
    ctx.ellipse(x+20, y-8, w*0.6, h*0.8, 0, 0, Math.PI*2);
    ctx.fill();
  });

  // Ground
  ctx.fillStyle = '#8BC34A';
  ctx.fillRect(0, H - GROUND_H, W, 16);
  ctx.fillStyle = '#6D4C41';
  ctx.fillRect(0, H - GROUND_H + 16, W, GROUND_H - 16);
}

function drawPipes() {
  pipes.forEach(p => {
    // Top pipe
    drawPipe(p.x, 0, PIPE_WIDTH, p.topH, true);
    // Bottom pipe
    const botY = p.topH + PIPE_GAP;
    drawPipe(p.x, botY, PIPE_WIDTH, H - GROUND_H - botY, false);
  });
}

function drawPipe(x, y, w, h, isTop) {
  const capH = 18, capExtra = 6;
  // Pipe body gradient
  const grad = ctx.createLinearGradient(x, 0, x + w, 0);
  grad.addColorStop(0,    '#388E3C');
  grad.addColorStop(0.3,  '#66BB6A');
  grad.addColorStop(0.7,  '#43A047');
  grad.addColorStop(1,    '#2E7D32');
  ctx.fillStyle = grad;

  if (isTop) {
    ctx.fillRect(x, y, w, h - capH);
    // Cap
    ctx.fillStyle = '#2E7D32';
    ctx.fillRect(x - capExtra, h - capH, w + capExtra * 2, capH);
    ctx.fillStyle = '#66BB6A';
    ctx.fillRect(x - capExtra, h - capH, 6, capH);
  } else {
    ctx.fillRect(x, y + capH, w, h - capH);
    // Cap
    ctx.fillStyle = '#2E7D32';
    ctx.fillRect(x - capExtra, y, w + capExtra * 2, capH);
    ctx.fillStyle = '#66BB6A';
    ctx.fillRect(x - capExtra, y, 6, capH);
  }
}

function drawBird() {
  ctx.save();
  ctx.translate(BIRD_X, bird.y);
  ctx.rotate(bird.rot * Math.PI / 180);

  // Body
  ctx.fillStyle = '#FFD700';
  ctx.beginPath();
  ctx.ellipse(0, 0, 18, 14, 0, 0, Math.PI * 2);
  ctx.fill();

  // Wing
  const wingY = 4 + bird.wing * 5;
  ctx.fillStyle = '#FFA000';
  ctx.beginPath();
  ctx.ellipse(-4, wingY, 10, 6, -0.3, 0, Math.PI * 2);
  ctx.fill();

  // Eye
  ctx.fillStyle = '#fff';
  ctx.beginPath();
  ctx.arc(8, -4, 5, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = '#1a1a1a';
  ctx.beginPath();
  ctx.arc(9, -4, 2.5, 0, Math.PI * 2);
  ctx.fill();

  // Beak
  ctx.fillStyle = '#FF6F00';
  ctx.beginPath();
  ctx.moveTo(14, -1);
  ctx.lineTo(21, 2);
  ctx.lineTo(14, 5);
  ctx.closePath();
  ctx.fill();

  ctx.restore();
}

function drawParticles() {
  particles.forEach(p => {
    ctx.globalAlpha = Math.min(1, p.life / 15);
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
    ctx.fill();
  });
  ctx.globalAlpha = 1;
}

function drawScore() {
  ctx.fillStyle = '#fff';
  ctx.strokeStyle = '#333';
  ctx.lineWidth = 3;
  ctx.font = 'bold 36px Arial';
  ctx.textAlign = 'center';
  ctx.strokeText(score, W / 2, 60);
  ctx.fillText(score, W / 2, 60);
}

function drawMenu() {
  // Panel
  ctx.fillStyle = 'rgba(0,0,0,0.45)';
  roundRect(ctx, W/2 - 140, H/2 - 120, 280, 240, 16);

  ctx.fillStyle = '#FFD700';
  ctx.font = 'bold 48px Arial';
  ctx.textAlign = 'center';
  ctx.strokeStyle = '#FF6F00';
  ctx.lineWidth = 3;
  ctx.strokeText('FLAPPY BIRD', W/2, H/2 - 60);
  ctx.fillText('FLAPPY BIRD', W/2, H/2 - 60);

  ctx.fillStyle = '#fff';
  ctx.font = 'bold 20px Arial';
  ctx.fillText('Tap or press Space', W/2, H/2);

  if (highScore > 0) {
    ctx.fillStyle = '#FFD700';
    ctx.font = '18px Arial';
    ctx.fillText(`Best: ${highScore}`, W/2, H/2 + 40);
  }

  ctx.fillStyle = 'rgba(255,255,255,0.5)';
  ctx.font = '14px Arial';
  ctx.fillText('avoid the pipes · survive!', W/2, H/2 + 80);
}

function drawGameOver() {
  ctx.fillStyle = 'rgba(0,0,0,0.5)';
  roundRect(ctx, W/2 - 140, H/2 - 120, 280, 250, 16);

  ctx.fillStyle = '#FF5252';
  ctx.font = 'bold 40px Arial';
  ctx.textAlign = 'center';
  ctx.strokeStyle = '#B71C1C';
  ctx.lineWidth = 3;
  ctx.strokeText('GAME OVER', W/2, H/2 - 60);
  ctx.fillText('GAME OVER', W/2, H/2 - 60);

  ctx.fillStyle = '#fff';
  ctx.font = 'bold 24px Arial';
  ctx.fillText(`Score: ${score}`, W/2, H/2 - 10);

  ctx.fillStyle = '#FFD700';
  ctx.font = 'bold 20px Arial';
  ctx.fillText(`Best: ${highScore}`, W/2, H/2 + 30);

  // Medal
  if (score >= 40) drawMedal('platinum', W/2, H/2 + 70);
  else if (score >= 30) drawMedal('gold', W/2, H/2 + 70);
  else if (score >= 20) drawMedal('silver', W/2, H/2 + 70);
  else if (score >= 10) drawMedal('bronze', W/2, H/2 + 70);

  ctx.fillStyle = '#fff';
  ctx.font = '16px Arial';
  ctx.fillText('Tap or Space to restart', W/2, H/2 + 110);
}

function drawMedal(type, x, y) {
  const colors = { platinum:'#E0E0E0', gold:'#FFD700', silver:'#B0BEC5', bronze:'#CD7F32' };
  ctx.fillStyle = colors[type];
  ctx.beginPath(); ctx.arc(x, y, 16, 0, Math.PI*2); ctx.fill();
  ctx.strokeStyle = '#333'; ctx.lineWidth = 2; ctx.stroke();
  ctx.fillStyle = '#333';
  ctx.font = 'bold 10px Arial';
  ctx.fillText(type.slice(0,2).toUpperCase(), x, y + 4);
}

function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x+r,y);
  ctx.lineTo(x+w-r,y); ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r); ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h); ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r); ctx.quadraticCurveTo(x,y,x+r,y);
  ctx.closePath();
  ctx.fill();
}

// ── Game loop ──────────────────────────────────────────────────────────────
function loop(ts) {
  if (!lastTime) lastTime = ts;
  const dt = Math.min((ts - lastTime) / (1000 / 60), 3); // cap at 3 frames
  lastTime = ts;

  update(dt);

  // Flash on death
  if (flashTimer > 0) {
    ctx.fillStyle = '#fff';
    ctx.fillRect(0, 0, W, H);
  } else {
    drawBg();
    drawPipes();
    drawParticles();
    drawBird();
    if (state === 'playing') drawScore();
    if (state === 'menu')     drawMenu();
    if (state === 'gameover') { drawScore(); drawGameOver(); }
  }

  requestAnimationFrame(loop);
}

init();
requestAnimationFrame(loop);
</script>
</body>
</html>
